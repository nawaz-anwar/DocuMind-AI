version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_MODEL=text-embedding-3-small
      - CHAT_MODEL=gpt-4-turbo-preview
      - MAX_FILE_SIZE=10485760
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  uploads:
